<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Use a smaller favicon/logo file if available -->
    <link rel="icon" type="image/webp" href="/TasteLocal_logo_small.webp" />
    <link rel="alternate icon" type="image/png" href="/TasteLocal_logo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#EE7A1B" />
    <meta
      name="description"
      content="TasteLocal - Discover authentic local food experiences in Singapore. Book food tours, cooking classes, and culinary adventures."

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the homepage LCP image -->
    <link
      rel="preload"
      as="image"
      href="/media/experiences/vegan-hawker-taste-tour-hero.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- Keep font request light -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>TasteLocal - Discover Authentic Food Experiences</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
